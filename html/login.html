<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisan Vani | Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <a href="dashboard.html" class="back-link" id="backLink">← Back to Dashboard</a>
            <select id="login-lang" class="lang-select">
                <option value="en-IN">English</option>
                <option value="hi-IN">हिंदी</option>
                <option value="or-IN">ଓଡ଼ିଆ</option>
            </select>
        </div>

        <div class="login-body">
            <div class="brand-title">🌾 Kisan Vani</div>
            <h2 id="welcomeTitle">Welcome Back</h2>
            <p id="welcomeSub">Enter your details to open your Digital Saathi</p>

            <form id="loginForm">
                
                <div class="input-group">
                    <label for="fullName" id="nameLabel">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="E.g. Ramesh Kumar">
                </div>
                
                <div class="input-group">
                    <label for="phone" id="phoneLabel">Mobile Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+91" pattern="[0-9]{10}" title="Please enter a valid 10-digit number">
                </div>

                <button type="button" class="login-submit-btn" id="loginBtn" onclick="handleLogin()">GET STARTED</button>
            </form>
        </div>
    </div>

    <script>
        const translations = {
            "en-IN": {
                nameError: "Please enter your name",
                phoneError: "Invalid 10-digit phone",
                backLink: "← Back to Dashboard",
                welcomeTitle: "Welcome Back",
                welcomeSub: "Enter your details to open your Digital Saathi",
                nameLabel: "Full Name",
                namePlaceholder: "E.g. Ramesh Kumar",
                phoneLabel: "Mobile Number",
                loginBtn: "GET STARTED"
            },
            "hi-IN": {
                nameError: "कृपया अपना नाम दर्ज करें",
                phoneError: "अवैध 10-अंकीय फोन",
                backLink: "← डैशबोर्ड पर वापस जाएं",
                welcomeTitle: "वापसी पर स्वागत है",
                welcomeSub: "अपना डिजिटल साथी खोलने के लिए अपना विवरण दर्ज करें",
                nameLabel: "पूरा नाम",
                namePlaceholder: "उदा. रमेश कुमार",
                phoneLabel: "मोबाइल नंबर",
                loginBtn: "शुरू करें"
            },
            "or-IN": {
                nameError: "ଦୟାକରି ଆପଣଙ୍କର ନାମ ପ୍ରବେଶ କରନ୍ତୁ",
                phoneError: "ଅବୈଧ 10-ଅଙ୍କ ବିଶିଷ୍ଟ ଫୋନ୍",
                backLink: "← ଡ୍ୟାସବୋର୍ଡକୁ ଫେରନ୍ତୁ",
                welcomeTitle: "ସ୍ଵାଗତମ୍",
                welcomeSub: "ଆପଣଙ୍କର ଡିଜିଟାଲ୍ ସାଥୀ ଖୋଲିବାକୁ ନିଜର ବିବରଣୀ ପ୍ରଦାନ କରନ୍ତୁ",
                nameLabel: "ପୂରା ନାମ",
                namePlaceholder: "ଉଦାହରଣ: ରମେଶ କୁମାର",
                phoneLabel: "ମୋବାଇଲ୍ ନମ୍ବର",
                loginBtn: "ଆରମ୍ଭ କରନ୍ତୁ"
            }
        };
    </script>
    <script src="../js/login.js"></script>

</body>
</html>
