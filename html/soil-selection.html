<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Soil | Kisan Vani</title>
    <link rel="stylesheet" href="../css/soil-selection.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" style="text-decoration: none; color: white;">
                <div class="logo">🌾 Kisan Vani</div>
            </a>
        </div>
        <div class="nav-right">
            <select id="dashboard-lang" class="lang-select">
                <option value="en-IN">English</option>
                <option value="hi-IN">हिंदी</option>
                <option value="or-IN">ଓଡ଼ିଆ</option>
            </select>
        </div>
    </nav>

    <div class="page-container">
        <h1 class="page-title" id="pageTitle">What is your soil type?</h1>
        <div class="soil-grid">
            <div class="soil-card" onclick="selectSoil('alluvial')">
                <h3 id="soilAlluvial">Alluvial Soil</h3>
            </div>
            <div class="soil-card" onclick="selectSoil('black')">
                <h3 id="soilBlack">Black Soil</h3>
            </div>
            <div class="soil-card" onclick="selectSoil('red')">
                <h3 id="soilRed">Red Soil</h3>
            </div>
            <div class="soil-card" onclick="selectSoil('laterite')">
                <h3 id="soilLaterite">Laterite Soil</h3>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            "en-IN": { pageTitle: "What is your soil type?", alluvial: "Alluvial Soil", black: "Black Soil", red: "Red Soil", laterite: "Laterite Soil" },
            "hi-IN": { pageTitle: "आपकी मिट्टी का प्रकार क्या है?", alluvial: "जलोढ़ मिट्टी", black: "काली मिट्टी", red: "लाल मिट्टी", laterite: "लेटराइट मिट्टी" },
            "or-IN": { pageTitle: "ଆପଣଙ୍କର ମାଟି ପ୍ରକାର କ'ଣ?", alluvial: "ଜଳୋଢ଼ ମୃତ୍ତିକା", black: "କଳା ମୃତ୍ତିକା", red: "ନାଲି ମୃତ୍ତିକା", laterite: "ଲାଟେରାଇଟ୍ ମୃତ୍ତିକା" }
        };

        const langSelect = document.getElementById('dashboard-lang');
        
        langSelect.addEventListener('change', (e) => {
            const lang = e.target.value;
            localStorage.setItem('kisanGlobalLang', lang); 
            applyTranslation(lang);
        });

        function applyTranslation(lang) {
            const t = translations[lang];
            if (!t) return;
            document.getElementById('pageTitle').innerText = t.pageTitle;
            document.getElementById('soilAlluvial').innerText = t.alluvial;
            document.getElementById('soilBlack').innerText = t.black;
            document.getElementById('soilRed').innerText = t.red;
            document.getElementById('soilLaterite').innerText = t.laterite;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('kisanGlobalLang') || 'en-IN';
            langSelect.value = savedLang;
            applyTranslation(savedLang);
        });

        // Saves choice to memory and redirects to details page
        function selectSoil(soilType) {
            localStorage.setItem('selectedSoil', soilType);
            window.location.href = 'soil-details.html';
        }
    </script>
</body>
</html>
