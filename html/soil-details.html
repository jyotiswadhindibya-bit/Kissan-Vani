<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Details | Kisan Vani</title>
    <link rel="stylesheet" href="../css/soil-details.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="dashboard.html" style="text-decoration: none; color: white;">
                <div class="logo">🌾 Kisan Vani</div>
            </a>
        </div>
        <div class="nav-right">
            <select id="dashboard-lang" class="lang-select">
                <option value="en-IN">English</option>
                <option value="hi-IN">हिंदी</option>
                <option value="or-IN">ଓଡ଼ିଆ</option>
            </select>
        </div>
    </nav>

    <div class="page-container">
        <div class="soil-details-card">
            <div class="soil-details-header">
                <h2 id="soilName">Loading...</h2>
            </div>
            
            <div class="detail-section">
                <h3 id="labelCrops">Suitable Crops</h3>
                <ul id="listCrops"></ul>
            </div>

            <div class="detail-section">
                <h3 id="labelPros">Pros (Benefits)</h3>
                <ul id="listPros"></ul>
            </div>

            <div class="detail-section">
                <h3 id="labelCons">Cons (Challenges)</h3>
                <ul id="listCons"></ul>
            </div>
            
            <div class="button-group">
                <a href="soil-selection.html" class="cta-button secondary" id="btnBackSelection">BACK TO SELECTION</a>
                <a href="dashboard.html" class="cta-button" id="btnDashboard">GO TO DASHBOARD</a>
            </div>
        </div>
    </div>

    <script>
        // The data is baked right in
        const soilDatabase = {
            "alluvial": {
                "en-IN": { "name": "Alluvial Soil", "crops": ["Rice", "Wheat", "Sugarcane", "Cotton", "Jute"], "pros": ["Highly fertile", "Rich in potash", "Good water retention"], "cons": ["Lacks nitrogen and phosphorus", "Requires regular fertilization for high yield"] },
                "hi-IN": { "name": "जलोढ़ मिट्टी", "crops": ["चावल", "गेहूँ", "गन्ना", "कपास", "जूट"], "pros": ["अत्यधिक उपजाऊ", "पोटाश से भरपूर", "अच्छी जल धारण क्षमता"], "cons": ["नाइट्रोजन और फास्फोरस की कमी", "उच्च उपज के लिए नियमित खाद की आवश्यकता"] },
                "or-IN": { "name": "ଜଳୋଢ଼ ମୃତ୍ତିକା", "crops": ["ଧାନ", "ଗହମ", "ଆଖୁ", "କପା", "ଝୋଟ"], "pros": ["ଅତ୍ୟନ୍ତ ଉର୍ବର", "ପୋଟାସ୍ ରେ ଭରପୂର", "ଭଲ ଜଳ ଧାରଣ କ୍ଷମତା"], "cons": ["ଯବକ୍ଷାରଜାନ ଏବଂ ଫସଫରସ୍ ର ଅଭାବ", "ଅଧିକ ଅମଳ ପାଇଁ ନିୟମିତ ସାର ଆବଶ୍ୟକ"] }
            },
            "black": {
                "en-IN": { "name": "Black Soil", "crops": ["Cotton", "Soybean", "Millets", "Tobacco"], "pros": ["Excellent moisture retention", "Rich in calcium and magnesium"], "cons": ["Sticky when wet, hard to plough", "Develops deep cracks in dry season"] },
                "hi-IN": { "name": "काली मिट्टी", "crops": ["कपास", "सोयाबीन", "बाजरा", "तंबाकू"], "pros": ["उत्कृष्ट नमी धारण क्षमता", "कैल्शियम और मैग्नीशियम से भरपूर"], "cons": ["गीली होने पर चिपचिपी, जोतने में मुश्किल", "सूखे मौसम में गहरी दरारें पड़ जाती हैं"] },
                "or-IN": { "name": "କଳା ମୃତ୍ତିକା", "crops": ["କପା", "ସୋୟାବିନ୍", "ବାଜରା", "ତମାଖୁ"], "pros": ["ଉତ୍କୃଷ୍ଟ ଆର୍ଦ୍ରତା ଧାରଣ", "କ୍ୟାଲସିୟମ୍ ଏବଂ ମ୍ୟାଗ୍ନେସିୟମ୍ ରେ ଭରପୂର"], "cons": ["ଓଦା ଥିଲେ ଅଠାଳିଆ, ଚାଷ କରିବା କଷ୍ଟକର", "ଶୁଖିଲା ଋତୁରେ ଗଭୀର ଫାଟ ସୃଷ୍ଟି ହୁଏ"] }
            },
            "red": {
                "en-IN": { "name": "Red Soil", "crops": ["Groundnut", "Potato", "Maize", "Fruits"], "pros": ["Good drainage", "Responds well to fertilizers"], "cons": ["Poor in humus and nitrogen", "Requires heavy irrigation"] },
                "hi-IN": { "name": "लाल मिट्टी", "crops": ["मूंगफली", "आलू", "मक्का", "फल"], "pros": ["अच्छी जल निकासी", "उर्वरकों के प्रति अच्छी प्रतिक्रिया"], "cons": ["ह्यूमस और नाइट्रोजन में खराब", "भारी सिंचाई की आवश्यकता है"] },
                "or-IN": { "name": "ନାଲି ମୃତ୍ତିକା", "crops": ["ଚିନାବାଦାମ", "ଆଳୁ", "ମକା", "ଫଳ"], "pros": ["ଭଲ ଜଳ ନିଷ୍କାସନ", "ସାର ପାଇଁ ଭଲ ପ୍ରତିକ୍ରିୟା ଦିଏ"], "cons": ["ହ୍ୟୁମସ୍ ଏବଂ ଯବକ୍ଷାରଜାନ କମ୍", "ଅଧିକ ଜଳସେଚନ ଆବଶ୍ୟକ"] }
            },
            "laterite": {
                "en-IN": { "name": "Laterite Soil", "crops": ["Tea", "Coffee", "Cashew", "Rubber"], "pros": ["Good for plantation crops", "Excellent building material when dried"], "cons": ["Highly acidic", "Low fertility without manures"] },
                "hi-IN": { "name": "लेटराइट मिट्टी", "crops": ["चाय", "कॉफी", "काजू", "रबड़"], "pros": ["बागान फसलों के लिए अच्छा", "सूखने पर उत्कृष्ट निर्माण सामग्री"], "cons": ["अत्यधिक अम्लीय", "खाद के बिना कम उर्वरता"] },
                "or-IN": { "name": "ଲାଟେରାଇଟ୍ ମୃତ୍ତିକା", "crops": ["ଚା", "କଫି", "କାଜୁ", "ରବର"], "pros": ["ବଗିଚା ଫସଲ ପାଇଁ ଭଲ", "ଶୁଖିଗଲେ ଉତ୍କୃଷ୍ଟ ନିର୍ମାଣ ସାମଗ୍ରୀ"], "cons": ["ଅଧିକ ଅମ୍ଳୀୟ", "ଖତ ବିନା କମ୍ ଉର୍ବରତା"] }
            }
        };

        const uiTranslations = {
            "en-IN": { 
                labelCrops: "Suitable Crops", labelPros: "Pros (Benefits)", labelCons: "Cons (Challenges)", 
                btnBackSelection: "BACK TO SELECTION", btnDashboard: "GO TO DASHBOARD" 
            },
            "hi-IN": { 
                labelCrops: "उपयुक्त फसलें", labelPros: "फायदे", labelCons: "नुकसान (चुनौतियां)", 
                btnBackSelection: "चयन पर वापस जाएं", btnDashboard: "डैशबोर्ड पर जाएं" 
            },
            "or-IN": { 
                labelCrops: "ଉପଯୁକ୍ତ ଫସଲ", labelPros: "ଲାଭ", labelCons: "ଅସୁବିଧା (ଆହ୍ୱାନ)", 
                btnBackSelection: "ପଛକୁ ଫେରନ୍ତୁ", btnDashboard: "ଡ୍ୟାସବୋର୍ଡକୁ ଯାଆନ୍ତୁ" 
            }
        };

        const langSelect = document.getElementById('dashboard-lang');
        
        langSelect.addEventListener('change', (e) => {
            const lang = e.target.value;
            localStorage.setItem('kisanGlobalLang', lang); 
            renderContent(lang);
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('kisanGlobalLang') || 'en-IN';
            langSelect.value = savedLang;
            renderContent(savedLang);
        });

        function renderContent(lang) {
            const selectedSoil = localStorage.getItem('selectedSoil');
            
            if (!selectedSoil) {
                document.getElementById('soilName').innerText = "No soil selected. Go back to the selection page.";
                return;
            }

            const ui = uiTranslations[lang];
            document.getElementById('labelCrops').innerText = ui.labelCrops;
            document.getElementById('labelPros').innerText = ui.labelPros;
            document.getElementById('labelCons').innerText = ui.labelCons;
            
            // Apply translations to both buttons
            document.getElementById('btnBackSelection').innerText = ui.btnBackSelection;
            document.getElementById('btnDashboard').innerText = ui.btnDashboard;

            const data = soilDatabase[selectedSoil][lang];
            document.getElementById('soilName').innerText = data.name;
            
            populateList('listCrops', data.crops);
            populateList('listPros', data.pros);
            populateList('listCons', data.cons);
        }

        function populateList(elementId, items) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.innerText = item;
                ul.appendChild(li);
            });
        }
    </script>
</body>
</html>
